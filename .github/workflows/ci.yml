name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # lume's RUNTIME is stdlib-only (no package deps to install), but pytest
      # is a TEST tool the runner does not ship - it must be installed here.
      - name: Install test tooling
        run: python -m pip install pytest
      - name: Check ADOPTERS.md is in sync with ADOPTERS.json
        run: python tools/render_adopters.py --check
      - name: Run tests
        run: python -m pytest -q
